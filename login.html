<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; }
        .login { width: 300px; margin: 80px auto; background: #fff;
                 padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
        label { display: block; margin-bottom: 12px; font-size: 14px; }
        input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2563eb; color: #fff;
                 border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <main class="login">
        <h1>Вхід</h1>
        <form action="/auth" method="post">
            <label>Логін
                <input type="text" name="username" required>
            </label>
            <label>Пароль
                <input type="password" name="password" required>
            </label>
            <button type="submit">Увійти</button>
        </form>
    </main>
</body>
</html>
